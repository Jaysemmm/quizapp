<div class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <img src="/logo.png" alt="Quiz App Logo" class="logo-img" />
        </div>
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join our learning community today</p>
      </div>

      <div *ngIf="errorMessage" class="alert error">{{ errorMessage }}</div>
      <div *ngIf="successMessage" class="alert success">{{ successMessage }}</div>

      <form (ngSubmit)="onRegister()">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input
            type="text"
            [(ngModel)]="username"
            name="username"
            placeholder="Choose a username (min 3 chars)"
            class="form-input"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Enter your password (min 3 chars)"
            class="form-input"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input
            type="password"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            placeholder="Confirm your password"
            class="form-input"
            required
          />
        </div>

        <button
          type="submit"
          class="form-button"
          [disabled]="!username || !password || !confirmPassword || isLoading"
        >
          {{ isLoading ? 'Creating Account...' : 'Create Account' }}
        </button>
      </form>

      <div class="auth-footer">
        Already have an account?
        <a routerLink="/login">Login here</a>
      </div>
    </div>
  </div>
</div>
